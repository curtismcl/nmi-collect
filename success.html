
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px 0;
    }

    #token-badge {
      display: flex;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #card-summary {
      margin-left: auto;
      font-family: monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    #revalidate-btn {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 16px;
      background: transparent;
      color: #6b7280;
      font-size: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      cursor: pointer;
    }
    #revalidate-btn:hover { background: #f9fafb; }
  </style>
</head>

<body>
  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Card validated — ready to save
    <span id="card-summary"></span>
</div>

  <p id="instruction" style="margin-top: 12px; font-size: 13px; color: #374151; text-align: center;">
    ✓ Card saved! Select it from the <strong>Select a Card</strong> dropdown above to process your payment.
  </p>

  <button id="revalidate-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
    Use a different card
  </button>

  <script>
    const params      = new URLSearchParams(window.location.search);
    const cardType    = params.get('cardType')    || '';
    const last4       = params.get('last4')       || '';
    const residentId  = params.get('residentId')  || '';

    document.getElementById('card-summary').textContent =
      [cardType, last4 ? `····${last4}` : ''].filter(Boolean).join(' ');

    // Go back to index preserving resident context
    document.getElementById('revalidate-btn').addEventListener('click', function() {
      window.location.href = `index.html?residentId=${encodeURIComponent(residentId)}`;
    });
  </script>
</body>
</html>
