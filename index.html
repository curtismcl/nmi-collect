<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
    }
    #launch-btn { display: none !important; }

    #saving-msg {
      display: none;
      padding: 10px 12px;
      font-size: 13px;
      color: #4f46e5;
      align-items: center;
      gap: 8px;
    }
    #saving-msg.visible { display: flex; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #c7d2fe;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="lightbox"
    data-price=""
  ></script>
</head>

<body>
  <button id="launch-btn">Enter Card Details</button>
  <div id="saving-msg">
    <span class="spinner"></span>
    Securing card...
  </div>

  <script>
    const AIRTABLE_TOKEN = 'patqJqhMwGnyGpH2d.4ab694ddc5355743167d0f18cdbe6a9601b18629826b2f9308ecf4aefe26e728';
    const AIRTABLE_BASE  = 'applW81Cc4MFZVSHu';
    const AIRTABLE_TABLE = 'tbloUPCH3FsPApg2S';

    const urlParams  = new URLSearchParams(window.location.search);
    const residentId = urlParams.get('residentId') || '';

    function formatExp(raw) {
      if (!raw || raw.length !== 4) return raw || '';
      return raw.slice(0, 2) + '/' + raw.slice(2);
    }

    async function saveTokenToAirtable(token, brand, last4, exp) {
      const body = JSON.stringify({
        fields: {
          'Token':       token,
          'Card Brand':  brand,
          'Last4':       last4,
          'Exp':         exp,
          'Resident ID': residentId
        }
      });

      const response = await fetch(
        `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: body
        }
      );

      const data = await response.json();
      console.log('Airtable token response status:', response.status);
      console.log('Airtable token response:', JSON.stringify(data));
      return data.id;
    }

    async function triggerVaultWorkflow(token, cardType, last4, exp) {
      await fetch('https://api.retool.com/v1/workflows/37593cf0-b900-4c62-954b-a3d4f6ce8d28/startTrigger', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          paymentToken: token,
          residentId: residentId,
          cardType: cardType,
          last4: last4,
          exp: exp
        })
      });
    }

    const xCover = document.createElement('div');
    xCover.id = 'nmi-x-cover';
    Object.assign(xCover.style, {
      position: 'fixed', display: 'none', background: 'white',
      zIndex: '10000', borderRadius: '50%', width: '40px', height: '40px'
    });
    document.body.appendChild(xCover);

    function positionXCover() {
      const iframe = document.getElementById('CollectJSIframe');
      if (!iframe) { setTimeout(positionXCover, 100); return; }
      const rect = iframe.getBoundingClientRect();
      if (rect.width === 0) { setTimeout(positionXCover, 100); return; }
      xCover.style.top     = (rect.top + 4) + 'px';
      xCover.style.left    = (rect.left + rect.width - 40) + 'px';
      xCover.style.display = 'block';
    }

    function applyOverrides() {
      const fade = document.querySelector('.CollectJSFade');
      if (fade) { fade.style.pointerEvents = 'none'; fade.style.transition = 'none'; }
      const iframe = document.getElementById('CollectJSIframe');
      if (iframe) {
        iframe.style.border     = 'none';
        iframe.style.boxShadow  = 'none';
        iframe.style.top        = '20px';
        iframe.style.animation  = 'none';
        iframe.style.transition = 'none';
      }
      positionXCover();
    }

    const observer = new MutationObserver(() => applyOverrides());
    observer.observe(document.body, { childList: true, subtree: true });

    CollectJS.configure({
      variant:    'lightbox',
      buttonText: 'Validate Card',

      fieldsAvailableCallback: function() {
        setTimeout(applyOverrides, 200);
      },

      timeoutDuration: 12000,
      timeoutCallback: function() {
        console.warn('Tokenization timed out');
      },

      callback: async function(response) {
        const token    = response.token;
        const cardType = response.card?.type   || '';
        const last4    = (response.card?.number || '').slice(-4);
        const exp      = formatExp(response.card?.exp || '');

        document.getElementById('saving-msg').classList.add('visible');

        try {
          const recordId = await saveTokenToAirtable(token, cardType, last4, exp);
          console.log('Token save complete, record:', recordId);

          if (recordId) {
            await triggerVaultWorkflow(token, cardType, last4, exp);
            window.location.href = `success.html?cardType=${encodeURIComponent(cardType)}&last4=${encodeURIComponent(last4)}&exp=${encodeURIComponent(exp)}&residentId=${encodeURIComponent(residentId)}`;
          } else {
            console.error('Save failed — no record ID returned');
            document.getElementById('saving-msg').innerHTML = '❌ Failed to save card. Please try again.';
          }
        } catch (err) {
          console.error('Save error:', err);
          document.getElementById('saving-msg').innerHTML = '❌ Error saving card. Please try again.';
        }
      },
    });

    window.addEventListener('load', function() {
      setTimeout(() => CollectJS.startPaymentRequest(), 500);
    });
  </script>
</body>
</html>
