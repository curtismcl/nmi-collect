
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px 0;
      color: #111827;
    }

    /* Button is hidden — lightbox fires automatically on load */
    #launch-btn { display: none !important; }

    /* Hide status bar text */
    #status-bar { display: none; }

    #token-badge {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #token-badge.visible { display: flex; }
    #card-summary {
      margin-left: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ── NMI Lightbox overrides ────────────────────────────────────────────── */

    /* Remove border and shadow from the lightbox modal */
    .CollectJSLightbox,
    .CollectJSLightbox * {
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
    }

    /* Push lightbox toward the top of the viewport */
    .CollectJSLightbox {
      top: 40px !important;
      transform: none !important;
      margin-top: 0 !important;
    }

    /* Disable clicks on the overlay so it can't be dismissed */
    .CollectJSOverlay {
      pointer-events: none !important;
    }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="lightbox"
    data-price=""
  ></script>
</head>

<body>

  <button id="launch-btn">Enter Card Details</button>

  <div id="status-bar" class="idle"></div>

  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Card secured — ready to save
    <span id="card-summary"></span>
  </div>

  <script>
    const btn         = document.getElementById('launch-btn');
    const tokenBadge  = document.getElementById('token-badge');
    const cardSummary = document.getElementById('card-summary');

    let currentToken = null;
    let cardType     = '';
    let last4        = '';

    function pushToRetool(extra = {}) {
      window.parent.postMessage({
        type:         'NMI_UPDATE',
        paymentToken: currentToken,
        tokenReady:   !!currentToken,
        cardType:     cardType,
        last4:        last4,
        ...extra,
      }, '*');
    }

    function resetUI() {
      currentToken = null; cardType = ''; last4 = '';
      tokenBadge.classList.remove('visible');
      pushToRetool();
      // Re-launch lightbox on reset
      setTimeout(() => CollectJS.startPaymentRequest(), 300);
    }

    CollectJS.configure({
      variant: 'lightbox',

      // Fires once NMI's fields are ready — use to block overlay dismissal
      fieldsAvailableCallback: function() {
        // Belt-and-suspenders: remove pointer events from overlay in the DOM
        const tryBlock = () => {
          const overlay = document.querySelector('.CollectJSOverlay');
          if (overlay) {
            overlay.style.pointerEvents = 'none';
          } else {
            setTimeout(tryBlock, 100);
          }
        };
        tryBlock();
      },

      callback: function(response) {
        currentToken = response.token;
        cardType     = response.card?.type   || '';
        last4        = response.card?.number || '';

        tokenBadge.classList.add('visible');
        cardSummary.textContent = [cardType, last4 ? `····${last4}` : ''].filter(Boolean).join(' ');

        pushToRetool();
      },
    });

    // Auto-launch lightbox on page load
    window.addEventListener('load', function() {
      setTimeout(() => CollectJS.startPaymentRequest(), 500);
    });

    // Listen for commands from Retool
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'NMI_COMMAND') return;
      if (data.action === 'reset') resetUI();
    });
  </script>

</body>
</html>
