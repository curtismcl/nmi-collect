
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 2px 0 8px;
      color: #111827;
    }

    .field-group { margin-bottom: 10px; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .collect-field {
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      padding: 0 12px;
      height: 40px;
      background: #ffffff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .collect-field.focused {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }
    .collect-field.valid   { border-color: #10b981; }
    .collect-field.invalid { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.10); }

    .row { display: flex; gap: 10px; }
    .row .field-group { flex: 1; }

    #status-bar {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    #status-bar.idle    { color: #9ca3af; }
    #status-bar.info    { color: #6b7280; }
    #status-bar.working { color: #4f46e5; }
    #status-bar.success { color: #059669; }
    #status-bar.error   { color: #dc2626; }

    #token-badge {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #token-badge.visible { display: flex; }
    #token-badge .badge-detail {
      margin-left: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #c7d2fe;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="inline">
  </script>
</head>

<body>

  <div class="field-group">
    <div class="field-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Card Number
    </div>
    <div id="ccnumber" class="collect-field"></div>
  </div>

  <div class="row">
    <div class="field-group">
      <div class="field-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Expiration
      </div>
      <div id="ccexp" class="collect-field"></div>
    </div>
    <div class="field-group">
      <div class="field-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        CVV
      </div>
      <div id="cvv" class="collect-field"></div>
    </div>
  </div>

  <div id="status-bar" class="idle">Enter card details to continue.</div>
  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    Card secured — ready to charge
    <span class="badge-detail" id="card-summary"></span>
  </div>

  <script>
    // ─── State ────────────────────────────────────────────────────────────────
    let currentToken = null;
    let cardType     = '';
    let last4        = '';
    const fieldState = { ccnumber: 'empty', ccexp: 'empty', cvv: 'empty' };

    const statusBar   = document.getElementById('status-bar');
    const tokenBadge  = document.getElementById('token-badge');
    const cardSummary = document.getElementById('card-summary');

    // ─── Send state to Retool via postMessage ─────────────────────────────────
    function pushToRetool(extra = {}) {
      const payload = {
        type:          'NMI_UPDATE',
        paymentToken:  currentToken,
        tokenReady:    !!currentToken,
        cardType:      cardType,
        last4:         last4,
        allFieldsValid: Object.values(fieldState).every(v => v === 'valid'),
        ...extra,
      };
      // Send to parent Retool window
      window.parent.postMessage(payload, '*');
    }

    function setStatus(msg, type, showSpinner = false) {
      statusBar.className = type;
      statusBar.innerHTML = showSpinner
        ? `<span class="spinner"></span> ${msg}`
        : msg;
    }

    function fieldEl(id) { return document.getElementById(id); }

    function resetUI() {
      currentToken = null; cardType = ''; last4 = '';
      Object.keys(fieldState).forEach(k => fieldState[k] = 'empty');
      ['ccnumber','ccexp','cvv'].forEach(id => {
        const el = fieldEl(id);
        if (el) el.className = 'collect-field';
      });
      tokenBadge.classList.remove('visible');
      setStatus('Enter card details to continue.', 'idle');
      pushToRetool();
    }

    // ─── CollectJS ────────────────────────────────────────────────────────────
    CollectJS.configure({
      variant: 'inline',
      styleSniffer: false,

      fields: {
        ccnumber: { selector: '#ccnumber', placeholder: '•••• •••• •••• ••••' },
        ccexp:    { selector: '#ccexp',    placeholder: 'MM / YY' },
        cvv:      { selector: '#cvv',      placeholder: 'CVV' },
      },

      focusEvent: function(field) {
        const el = fieldEl(field);
        if (el) { el.classList.add('focused'); el.classList.remove('invalid'); }
      },
      blurEvent: function(field) {
        const el = fieldEl(field);
        if (el) el.classList.remove('focused');
      },

      validationCallback: function(field, valid, message) {
        const el = fieldEl(field);
        fieldState[field] = valid ? 'valid' : 'invalid';

        if (el) {
          el.classList.remove('focused', 'valid', 'invalid');
          el.classList.add(valid ? 'valid' : 'invalid');
        }

        if (currentToken) {
          currentToken = null;
          tokenBadge.classList.remove('visible');
        }

        const allGood = Object.values(fieldState).every(v => v === 'valid');
        if (!valid && message) {
          setStatus(message, 'error');
        } else if (allGood) {
          setStatus('All fields look good.', 'success');
        } else {
          setStatus('Enter card details to continue.', 'idle');
        }

        pushToRetool();
      },

      timeoutDuration: 12000,
      timeoutCallback: function() {
        setStatus('Tokenization timed out — please try again.', 'error');
        pushToRetool({ tokenReady: false });
      },

      callback: function(response) {
        currentToken = response.token;
        cardType     = response.card?.type   || '';
        last4        = response.card?.number || '';

        tokenBadge.classList.add('visible');
        cardSummary.textContent = [cardType, last4 ? `····${last4}` : ''].filter(Boolean).join(' ');
        setStatus('', 'idle');

        pushToRetool();
      },
    });

    // ─── Listen for commands from Retool ──────────────────────────────────────
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'NMI_COMMAND') return;

      if (data.action === 'triggerToken') {
        const allGood = Object.values(fieldState).every(v => v === 'valid');
        if (!allGood) {
          setStatus('Please complete all card fields.', 'error');
          return;
        }
        currentToken = null;
        tokenBadge.classList.remove('visible');
        setStatus('Securing card data…', 'working', true);
        CollectJS.startPaymentRequest();
      }

      if (data.action === 'reset') {
        resetUI();
      }
    });
  </script>

</body>
</html>
