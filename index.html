
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px 0;
      color: #111827;
    }

    #launch-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    #launch-btn:hover  { background: #4338ca; }
    #launch-btn:active { transform: scale(0.98); }
    #launch-btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    #status-bar {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #status-bar.idle    { color: #9ca3af; }
    #status-bar.working { color: #4f46e5; }
    #status-bar.success { color: #059669; }
    #status-bar.error   { color: #dc2626; }

    #token-badge {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #token-badge.visible { display: flex; }
    #card-summary {
      margin-left: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #c7d2fe;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="lightbox"
    data-price=""
  ></script>
</head>

<body>

  <button id="launch-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="1" y="4" width="22" height="16" rx="2"/>
      <line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    Enter Card Details
  </button>

  <div id="status-bar" class="idle">Click above to securely enter card details.</div>

  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Card secured — ready to save
    <span id="card-summary"></span>
  </div>

  <script>
    const btn         = document.getElementById('launch-btn');
    const statusBar   = document.getElementById('status-bar');
    const tokenBadge  = document.getElementById('token-badge');
    const cardSummary = document.getElementById('card-summary');

    let currentToken = null;
    let cardType     = '';
    let last4        = '';

    function setStatus(msg, type, showSpinner = false) {
      statusBar.className = type;
      statusBar.innerHTML = showSpinner
        ? `<span class="spinner"></span> ${msg}`
        : msg;
    }

    function pushToRetool(extra = {}) {
      window.parent.postMessage({
        type:         'NMI_UPDATE',
        paymentToken: currentToken,
        tokenReady:   !!currentToken,
        cardType:     cardType,
        last4:        last4,
        ...extra,
      }, '*');
    }

    function resetUI() {
      currentToken = null; cardType = ''; last4 = '';
      tokenBadge.classList.remove('visible');
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="1" y="4" width="22" height="16" rx="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        Enter Card Details`;
      setStatus('Click above to securely enter card details.', 'idle');
      pushToRetool();
    }

    // Configure lightbox callback
    CollectJS.configure({
      variant: 'lightbox',

      callback: function(response) {
        currentToken = response.token;
        cardType     = response.card?.type   || '';
        last4        = response.card?.number || '';

        tokenBadge.classList.add('visible');
        cardSummary.textContent = [cardType, last4 ? `····${last4}` : ''].filter(Boolean).join(' ');

        btn.innerHTML = `
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          Card Entered — Click to Change`;
        btn.disabled = false;

        setStatus('', 'idle');
        pushToRetool();
      },
    });
    // Auto-launch when iframe loads
window.addEventListener('load', function() {
  setTimeout(() => {
    CollectJS.startPaymentRequest();
  }, 500);
});
    // Launch lightbox on button click
    btn.addEventListener('click', function() {
      btn.disabled = true;
      setStatus('Opening secure card entry…', 'working', true);
      CollectJS.startPaymentRequest();

      // Re-enable if user closes lightbox without submitting
      setTimeout(() => {
        if (!currentToken) {
          btn.disabled = false;
          setStatus('Click above to securely enter card details.', 'idle');
        }
      }, 3000);
    });

    // Listen for reset command from Retool
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'NMI_COMMAND') return;
      if (data.action === 'reset') resetUI();
    });
  </script>

</body>
</html>
