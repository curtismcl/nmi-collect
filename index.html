
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px 0;
      color: #111827;
    }

    #launch-btn { display: none !important; }
    #status-bar { display: none; }

    #token-badge {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #token-badge.visible { display: flex; }
    #card-summary {
      margin-left: auto;
      font-family: monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ── NMI Lightbox overrides ─────────────────────────────────────────────── */
    .CollectJSFade {
      pointer-events: none !important;
      transition: none !important;
    }

    #CollectJSIframe {
      border: none !important;
      box-shadow: none !important;
      top: 20px !important;
      width: 95vw !important;
      max-width: 600px !important;
      animation: none !important;
      transition: none !important;
    }

    .CollectJSBounceIn {
      animation: none !important;
      transition: none !important;
    }

    /* White cover to hide NMI's X close button */
    #nmi-x-cover {
      position: fixed;
      display: none;
      background: white;
      z-index: 10000;
      border-radius: 50%;
      width: 40px;
      height: 40px;
    }
    #nmi-x-cover.visible { display: block; }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="lightbox"
    data-price=""
  ></script>
</head>

<body>

  <button id="launch-btn">Enter Card Details</button>
  <div id="status-bar"></div>

  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Card validated — ready to save
    <span id="card-summary"></span>
  </div>

  <div id="nmi-x-cover"></div>

  <script>
    const tokenBadge  = document.getElementById('token-badge');
    const cardSummary = document.getElementById('card-summary');
    const xCover      = document.getElementById('nmi-x-cover');

    let currentToken = null;
    let cardType     = '';
    let last4        = '';

    // ── Push state to Retool via Airtable ─────────────────────────────────────
    async function saveTokenToAirtable(token, brand, last4digits) {
      const AIRTABLE_TOKEN = 'patqJqhMwGnyGpH2d.4ab694ddc5355743167d0f18cdbe6a9601b18629826b2f9308ecf4aefe26e728';
      const AIRTABLE_BASE  = 'applW81Cc4MFZVSHu';
      const AIRTABLE_TABLE = 'tbloUPCH3FsPApg2S';

      try {
        const response = await fetch(
          `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              fields: {
                'Token':      token,
                'Card Brand': brand,
                'Last4':      last4digits
              }
            })
          }
        );
        const data = await response.json();
        console.log('Token saved to Airtable:', data.id);
        return data.id;
      } catch (err) {
        console.error('Failed to save token to Airtable:', err);
      }
    }

    // ── Close the lightbox ────────────────────────────────────────────────────
function closeLightbox() {
  const fade   = document.querySelector('.CollectJSFade');
  const iframe = document.getElementById('CollectJSIframe');
  if (fade)   fade.style.display   = 'none';
  if (iframe) iframe.style.display = 'none';
  xCover.classList.remove('visible');
  // Reload the page to fully clear the lightbox state
  setTimeout(() => window.location.reload(), 1500);
}

    // ── Position X cover ──────────────────────────────────────────────────────
    function positionXCover() {
      const iframe = document.getElementById('CollectJSIframe');
      if (!iframe) { setTimeout(positionXCover, 100); return; }
      const rect = iframe.getBoundingClientRect();
      if (rect.width === 0) { setTimeout(positionXCover, 100); return; }
      xCover.style.top  = (rect.top + 4) + 'px';
      xCover.style.left = (rect.left + 432) + 'px';
      xCover.classList.add('visible');
    }

    function applyOverrides() {
      const fade = document.querySelector('.CollectJSFade');
      if (fade) {
        fade.style.pointerEvents = 'none';
        fade.style.transition    = 'none';
      }
      const iframe = document.getElementById('CollectJSIframe');
      if (iframe) {
        iframe.style.border     = 'none';
        iframe.style.boxShadow  = 'none';
        iframe.style.top        = '20px';
        iframe.style.animation  = 'none';
        iframe.style.transition = 'none';
      }
      positionXCover();
    }

    // Watch for NMI injecting elements
    const observer = new MutationObserver(function() {
      applyOverrides();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // ── CollectJS ─────────────────────────────────────────────────────────────
    CollectJS.configure({
      variant:    'lightbox',
      buttonText: 'Validate Card',

      fieldsAvailableCallback: function() {
        setTimeout(applyOverrides, 200);
      },

      timeoutDuration: 12000,
      timeoutCallback: function() {
        // Keep lightbox open — NMI will show its own timeout message
        console.warn('Collect.js tokenization timed out');
      },

      // ✅ Only fires on SUCCESS — close lightbox and show badge
      callback: async function(response) {
        currentToken = response.token;
        cardType     = response.card?.type   || '';
        last4        = response.card?.number || '';

        // Close the lightbox immediately
        closeLightbox();

        // Show success badge
        tokenBadge.classList.add('visible');
        cardSummary.textContent = [
          cardType,
          last4 ? `····${last4.slice(-4)}` : ''
        ].filter(Boolean).join(' ');

        // Save token to Airtable for Retool to pick up
        await saveTokenToAirtable(currentToken, cardType, last4.slice(-4));
      },
    });

    // Auto-launch lightbox on page load
    window.addEventListener('load', function() {
      setTimeout(() => CollectJS.startPaymentRequest(), 500);
    });

    // Listen for reset command from Retool
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'NMI_COMMAND') return;
      if (data.action === 'reset') {
        currentToken = null; cardType = ''; last4 = '';
        tokenBadge.classList.remove('visible');
        xCover.classList.remove('visible');
        cardSummary.textContent = '';
        setTimeout(() => CollectJS.startPaymentRequest(), 300);
      }
    });
  </script>

</body>
</html>
