
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      padding: 8px 0;
      color: #111827;
    }

    #launch-btn { display: none !important; }
    #status-bar { display: none; }

    #token-badge {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 7px;
      font-size: 12px;
      color: #166534;
      align-items: center;
      gap: 6px;
    }
    #token-badge.visible { display: flex; }
    #card-summary {
      margin-left: auto;
      font-family: monospace;
      font-size: 11px;
      color: #15803d;
      background: #dcfce7;
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ── NMI Lightbox overrides ─────────────────────────────────────────────── */

    .CollectJSFade {
      pointer-events: none !important;
      transition: none !important;
    }

    #CollectJSIframe {
      border: none !important;
      box-shadow: none !important;
      top: 20px !important;
      width: 95vw !important;
      max-width: 600px !important;
      animation: none !important;
      transition: none !important;
    }

    .CollectJSBounceIn {
      animation: none !important;
      transition: none !important;
    }

    /* White cover to hide NMI's X close button */
    #nmi-x-cover {
      position: fixed;
      display: none;
      background: white;
      z-index: 10000;
      border-radius: 50%;
    }
    #nmi-x-cover.visible {
      display: block;
    }
  </style>

  <script
    src="https://secure.nmi.com/token/Collect.js"
    data-tokenization-key="Sj6YaN-t3we7m-MDpj8R-8F9GgV"
    data-variant="lightbox"
    data-price=""
  ></script>
</head>

<body>

  <button id="launch-btn">Enter Card Details</button>
  <div id="status-bar"></div>

  <div id="token-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Card secured — ready to save
    <span id="card-summary"></span>
  </div>

  <div id="nmi-x-cover"></div>

  <script>
    const tokenBadge  = document.getElementById('token-badge');
    const cardSummary = document.getElementById('card-summary');
    const xCover      = document.getElementById('nmi-x-cover');

    let currentToken = null;
    let cardType     = '';
    let last4        = '';

    function pushToRetool(extra = {}) {
      window.parent.postMessage({
        type:         'NMI_UPDATE',
        paymentToken: currentToken,
        tokenReady:   !!currentToken,
        cardType:     cardType,
        last4:        last4,
        ...extra,
      }, '*');
    }

    function resetUI() {
      currentToken = null; cardType = ''; last4 = '';
      tokenBadge.classList.remove('visible');
      xCover.classList.remove('visible');
      pushToRetool();
      setTimeout(() => CollectJS.startPaymentRequest(), 300);
    }

    // Retry loop — keeps trying until iframe is rendered and measured
    function positionXCover() {
      const iframe = document.getElementById('CollectJSIframe');
      if (!iframe) { setTimeout(positionXCover, 100); return; }

      const rect = iframe.getBoundingClientRect();
      if (rect.width === 0) { setTimeout(positionXCover, 100); return; }

      // X button is in the top-right corner of the iframe
      xCover.style.top    = (rect.top + 4) + 'px';
xCover.style.left   = (rect.left + 432) + 'px';
      xCover.style.width  = '40px';
      xCover.style.height = '40px';
      xCover.classList.add('visible');
    }

    function applyOverrides() {
      // Block overlay clicks
      const fade = document.querySelector('.CollectJSFade');
      if (fade) {
        fade.style.pointerEvents = 'none';
        fade.style.transition = 'none';
      }

      // Style the iframe
      const iframe = document.getElementById('CollectJSIframe');
      if (iframe) {
        iframe.style.border     = 'none';
        iframe.style.boxShadow  = 'none';
        iframe.style.top        = '20px';
        iframe.style.animation  = 'none';
        iframe.style.transition = 'none';
      }

      // Start retry loop for X cover positioning
      positionXCover();
    }

    // Watch for NMI injecting elements into the DOM
    const observer = new MutationObserver(function() {
      applyOverrides();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    CollectJS.configure({
      variant: 'lightbox',

      fieldsAvailableCallback: function() {
        setTimeout(applyOverrides, 200);
      },

    callback: function(response) {
  currentToken = response.token;
  cardType     = response.card?.type   || '';
  last4        = response.card?.number || '';

  xCover.classList.remove('visible');
  tokenBadge.classList.add('visible');
  cardSummary.textContent = [cardType, last4 ? `····${last4}` : ''].filter(Boolean).join(' ');

  // Update URL so Retool can read token from iframe src
  const params = new URLSearchParams({
    token:    currentToken,
    cardType: cardType,
    last4:    last4,
    ready:    'true'
  });
  window.location.href = '?' + params.toString();
},
    });

    // Auto-launch lightbox on page load
    window.addEventListener('load', function() {
      setTimeout(() => CollectJS.startPaymentRequest(), 500);
    });

    // Listen for commands from Retool
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'NMI_COMMAND') return;
      if (data.action === 'reset') resetUI();
    });
  </script>

</body>
</html>
